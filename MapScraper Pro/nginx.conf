server {
    listen 8180;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Cache static assets
    location ~* \.(css|js|jsx|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api/v1/* → backend container on port 8100
    # This is the KEY piece: frontend JS uses /api/v1 (relative URL) in production
    location /api/ {
        proxy_pass         http://backend:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for SSE (Server-Sent Events) streaming
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
    }

    # All other routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
