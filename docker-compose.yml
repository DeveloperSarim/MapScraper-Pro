version: "3.9"

services:

  # ── FastAPI + Playwright backend ────────────────────────────────────────────
  backend:
    build:
      context: "./MapScraper Pro Backend"
      dockerfile: Dockerfile
    container_name: mapscraper_backend
    restart: unless-stopped
    expose:
      - "8100"
    environment:
      - PYTHONUNBUFFERED=1
    shm_size: "1gb"
    tmpfs:
      - /tmp
    networks:
      - mapscraper_net

  # ── Nginx frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: "./MapScraper Pro"
      dockerfile: Dockerfile
    container_name: mapscraper_frontend
    restart: unless-stopped
    # Internal only — Caddy proxies to this
    expose:
      - "8180"
    depends_on:
      - backend
    networks:
      - mapscraper_net

  # ── Caddy — Auto SSL + Domain Routing ──────────────────────────────────────
  # maps.sarimtools.com → HTTPS (auto Let's Encrypt cert)
  caddy:
    image: caddy:2-alpine
    container_name: mapscraper_caddy
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP → auto redirect to HTTPS
      - "443:443"   # HTTPS (maps.sarimtools.com)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data          # SSL certs stored here (persistent)
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - mapscraper_net

volumes:
  caddy_data:    # Keeps SSL certs across restarts
  caddy_config:

networks:
  mapscraper_net:
    driver: bridge
